<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>GlueZero — Live Showcase</title>

  <!-- Anti-FOUC IIFE: replicates the @gluezero/theme getInitialThemeScript pattern -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('gluezero.showcase.mode');
        var mode = stored || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-gz-theme', mode);
        document.documentElement.style.colorScheme = mode;
      } catch (e) {}
    })();
  </script>

  <!-- GlueZero canonical design tokens (--gz-*) -->
  <link rel="stylesheet" href="https://esm.sh/@gluezero/theme@1.1.0/dist/tokens-default.css">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0 }
    html, body { height: 100%; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif }
    body {
      background: light-dark(#fafafa, #0d0d0d);
      color: light-dark(#1a1a1a, #f0f0f0);
    }
    [data-gz-theme="dark"] body { background: #0d0d0d; color: #f0f0f0 }
    [data-gz-theme="light"] body { background: #fafafa; color: #1a1a1a }

    .app { display: grid; grid-template-columns: 290px 1fr; height: 100vh }

    aside.sidebar {
      background: light-dark(#ffffff, #161616);
      border-right: 1px solid light-dark(#e5e5e5, #2a2a2a);
      padding: 24px 0;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    [data-gz-theme="dark"] aside.sidebar { background: #161616; border-color: #2a2a2a }
    [data-gz-theme="light"] aside.sidebar { background: #ffffff; border-color: #e5e5e5 }

    .brand { padding: 0 24px 16px; border-bottom: 1px solid light-dark(#f0f0f0, #232323) }
    [data-gz-theme="dark"] .brand { border-color: #232323 }
    [data-gz-theme="light"] .brand { border-color: #f0f0f0 }
    .brand h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.02em }
    .brand h1 .badge {
      display: inline-block; margin-left: 6px; font-size: 11px; padding: 2px 6px;
      border-radius: 4px; background: #6366F1; color: white; font-weight: 600;
      vertical-align: middle;
    }
    .brand .tagline { font-size: 12px; opacity: 0.65; margin-top: 4px }

    nav { padding: 12px 0; flex: 1 }
    nav a {
      display: block; padding: 10px 24px; text-decoration: none;
      color: inherit; font-size: 14px; font-weight: 500;
      border-left: 3px solid transparent;
      transition: background 0.12s, border-color 0.12s;
    }
    nav a:hover { background: light-dark(#f5f5f5, #1f1f1f) }
    [data-gz-theme="dark"] nav a:hover { background: #1f1f1f }
    [data-gz-theme="light"] nav a:hover { background: #f5f5f5 }
    nav a.active { background: light-dark(#eef2ff, #1c1c2e); border-left-color: #6366F1; color: #6366F1; font-weight: 600 }
    [data-gz-theme="dark"] nav a.active { background: #1c1c2e }
    [data-gz-theme="light"] nav a.active { background: #eef2ff }

    .sidebar footer { padding: 16px 24px; border-top: 1px solid light-dark(#f0f0f0, #232323); display: flex; gap: 12px; align-items: center }
    [data-gz-theme="dark"] .sidebar footer { border-color: #232323 }
    [data-gz-theme="light"] .sidebar footer { border-color: #f0f0f0 }
    .sidebar footer button {
      flex: 1; padding: 8px; border: 1px solid light-dark(#e5e5e5, #333); background: transparent;
      color: inherit; border-radius: 6px; cursor: pointer; font-size: 13px;
    }
    [data-gz-theme="dark"] .sidebar footer button { border-color: #333 }
    [data-gz-theme="light"] .sidebar footer button { border-color: #e5e5e5 }
    .sidebar footer button:hover { background: light-dark(#f5f5f5, #1f1f1f) }
    .sidebar footer a { color: #6366F1; font-size: 13px; text-decoration: none }

    main.content { overflow-y: auto; padding: 40px 48px; max-width: 1100px }

    .welcome h2, .demo h2 { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px }
    .welcome p, .demo p.lead { font-size: 15px; opacity: 0.75; line-height: 1.6; margin-bottom: 24px }

    .welcome-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px;
      margin-top: 24px;
    }
    .welcome-card {
      padding: 20px; border-radius: 10px;
      background: light-dark(#ffffff, #161616);
      border: 1px solid light-dark(#e5e5e5, #2a2a2a);
      cursor: pointer;
      transition: transform 0.12s, border-color 0.12s;
      text-decoration: none; color: inherit; display: block;
    }
    [data-gz-theme="dark"] .welcome-card { background: #161616; border-color: #2a2a2a }
    [data-gz-theme="light"] .welcome-card { background: #ffffff; border-color: #e5e5e5 }
    .welcome-card:hover { transform: translateY(-2px); border-color: #6366F1 }
    .welcome-card .icon { font-size: 24px; margin-bottom: 10px }
    .welcome-card .title { font-weight: 600; font-size: 16px; margin-bottom: 4px }
    .welcome-card .desc { font-size: 13px; opacity: 0.7; line-height: 1.5 }

    .demo-section {
      background: light-dark(#ffffff, #161616);
      border: 1px solid light-dark(#e5e5e5, #2a2a2a);
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 24px;
    }
    [data-gz-theme="dark"] .demo-section { background: #161616; border-color: #2a2a2a }
    [data-gz-theme="light"] .demo-section { background: #ffffff; border-color: #e5e5e5 }
    .demo-section h3 { font-size: 16px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px }
    .demo-section h3 .pill { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 12px; background: #6366F1; color: white; text-transform: uppercase; letter-spacing: 0.05em }

    .controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px }
    .controls button, .controls input, .controls select {
      padding: 8px 14px; border-radius: 6px; font-size: 14px; font-family: inherit;
      border: 1px solid light-dark(#d4d4d8, #3a3a3a);
      background: light-dark(#fafafa, #1f1f1f); color: inherit;
      cursor: pointer;
    }
    [data-gz-theme="dark"] .controls button, [data-gz-theme="dark"] .controls input, [data-gz-theme="dark"] .controls select { background: #1f1f1f; border-color: #3a3a3a }
    [data-gz-theme="light"] .controls button, [data-gz-theme="light"] .controls input, [data-gz-theme="light"] .controls select { background: #fafafa; border-color: #d4d4d8 }
    .controls button.primary { background: #6366F1; color: white; border-color: #6366F1 }
    .controls button.primary:hover { background: #4f46e5 }
    .controls button:hover:not(.primary) { background: light-dark(#f0f0f0, #2a2a2a) }
    [data-gz-theme="dark"] .controls button:hover:not(.primary) { background: #2a2a2a }
    [data-gz-theme="light"] .controls button:hover:not(.primary) { background: #f0f0f0 }
    .controls input { min-width: 160px; cursor: text }

    .live-output {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 13px;
      background: light-dark(#f8fafc, #0a0a0a);
      border: 1px solid light-dark(#e5e5e5, #2a2a2a);
      border-radius: 6px;
      padding: 14px;
      min-height: 80px;
      max-height: 280px;
      overflow-y: auto;
      white-space: pre-wrap;
      line-height: 1.55;
    }
    [data-gz-theme="dark"] .live-output { background: #0a0a0a; border-color: #2a2a2a }
    [data-gz-theme="light"] .live-output { background: #f8fafc; border-color: #e5e5e5 }
    .live-output .row { padding: 2px 0 }
    .live-output .ts { opacity: 0.4; margin-right: 8px }
    .live-output .topic { color: #6366F1; font-weight: 600 }
    .live-output .ok { color: #10b981 }
    .live-output .err { color: #ef4444 }
    .live-output .info { color: #3b82f6 }

    pre.code {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 12.5px;
      background: light-dark(#1a1b26, #0d0e15);
      color: #c0caf5;
      border-radius: 6px;
      padding: 16px 18px;
      overflow-x: auto;
      line-height: 1.6;
      border: 1px solid #2a2b3a;
    }
    pre.code .comment { color: #565f89 }
    pre.code .keyword { color: #bb9af7 }
    pre.code .string  { color: #9ece6a }
    pre.code .fn      { color: #7aa2f7 }
    pre.code .num     { color: #ff9e64 }

    .stats { display: flex; gap: 16px; flex-wrap: wrap; margin: 12px 0 }
    .stat {
      padding: 10px 14px; border-radius: 8px;
      background: light-dark(#f8fafc, #0a0a0a);
      border: 1px solid light-dark(#e5e5e5, #2a2a2a);
      min-width: 110px;
    }
    [data-gz-theme="dark"] .stat { background: #0a0a0a; border-color: #2a2a2a }
    [data-gz-theme="light"] .stat { background: #f8fafc; border-color: #e5e5e5 }
    .stat .label { font-size: 11px; opacity: 0.6; text-transform: uppercase; letter-spacing: 0.05em }
    .stat .value { font-family: ui-monospace, monospace; font-size: 18px; font-weight: 600; margin-top: 2px }
    .stat .value.ok { color: #10b981 }
    .stat .value.warn { color: #f59e0b }

    .data-card {
      padding: 16px; border-radius: 8px;
      background: light-dark(#f8fafc, #0a0a0a);
      border-left: 4px solid #6366F1;
      margin: 8px 0;
    }
    [data-gz-theme="dark"] .data-card { background: #0a0a0a }
    [data-gz-theme="light"] .data-card { background: #f8fafc }
    .data-card pre { font-family: ui-monospace, monospace; font-size: 12px; white-space: pre-wrap; opacity: 0.85 }

    .pre-explainer { font-size: 13px; opacity: 0.7; margin-bottom: 8px; line-height: 1.5 }
    .badge-canonical { background: #10b981; color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; text-transform: uppercase }
    .badge-local { background: #f59e0b; color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; text-transform: uppercase }
    .badge-cache-hit { background: #10b981; color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; text-transform: uppercase }
    .badge-cache-miss { background: #ef4444; color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; text-transform: uppercase }

    /* Theme demo: brand swap targets — uses gluezero tokens */
    .theme-preview {
      padding: 24px; border-radius: 12px;
      background: var(--gz-color-surface-base, #ffffff);
      color: var(--gz-color-text-base, #1a1a1a);
      border: 1px solid var(--gz-color-border-base, #e5e5e5);
      transition: all 0.3s ease;
    }
    .theme-preview h4 { font-size: 18px; margin-bottom: 8px; color: var(--gz-color-text-base) }
    .theme-preview button[data-gz-role="action.primary"] {
      padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer;
      background: var(--gz-color-action-primary-bg, #6366F1);
      color: var(--gz-color-action-primary-text, #ffffff);
      font-weight: 600; font-size: 14px;
      margin-right: 8px; margin-top: 8px;
    }
    .theme-preview button[data-gz-role="action.secondary"] {
      padding: 10px 20px; border-radius: 6px; cursor: pointer;
      background: transparent;
      color: var(--gz-color-action-primary-bg, #6366F1);
      border: 1px solid var(--gz-color-action-primary-bg, #6366F1);
      font-weight: 600; font-size: 14px;
      margin-right: 8px; margin-top: 8px;
    }

    a.npm-link { color: #6366F1; text-decoration: none; font-size: 13px; font-weight: 500 }
    a.npm-link:hover { text-decoration: underline }

    @media (max-width: 760px) {
      .app { grid-template-columns: 1fr; height: auto }
      aside.sidebar { border-right: none; border-bottom: 1px solid light-dark(#e5e5e5, #2a2a2a) }
      main.content { padding: 24px 20px }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <h1>GlueZero <span class="badge">v1.1.0</span></h1>
        <p class="tagline">Live Showcase · 7 features</p>
      </div>
      <nav id="nav">
        <a href="#welcome" data-key="welcome">🏠 Welcome</a>
        <a href="#broker" data-key="broker">📡 Pub/Sub Broker</a>
        <a href="#mapping" data-key="mapping">🔀 Canonical Mapping</a>
        <a href="#routing" data-key="routing">🧭 Routing + Gateway</a>
        <a href="#worker" data-key="worker">⚙️ Worker Runtime</a>
        <a href="#cache" data-key="cache">💾 Cache Layer</a>
        <a href="#observability" data-key="observability">🔍 Observability</a>
        <a href="#theme" data-key="theme">🎨 Theme Layer</a>
      </nav>
      <footer>
        <button id="theme-toggle" type="button">🌓 Theme</button>
        <a href="https://github.com/omardimarzio/GlueZero" target="_blank" rel="noopener">GitHub</a>
      </footer>
    </aside>
    <main class="content" id="content"></main>
  </div>

  <script type="module">
    /* ============================================================
       GlueZero — Live Showcase
       Standalone HTML, no build step. Imports via esm.sh.
       ============================================================ */
    import { createBroker } from 'https://esm.sh/@gluezero/core@1.0.2'
    import { createMapperBroker } from 'https://esm.sh/@gluezero/mapper@1.0.2'
    import { createEventInspector } from 'https://esm.sh/@gluezero/devtools@1.1.0'

    const content = document.getElementById('content')
    const nav = document.getElementById('nav')

    /* ---------- Theme toggle (manual override of anti-FOUC IIFE) ---------- */
    document.getElementById('theme-toggle').addEventListener('click', () => {
      const cur = document.documentElement.getAttribute('data-gz-theme') || 'light'
      const next = cur === 'dark' ? 'light' : 'dark'
      document.documentElement.setAttribute('data-gz-theme', next)
      document.documentElement.style.colorScheme = next
      try { localStorage.setItem('gluezero.showcase.mode', next) } catch (e) {}
    })

    /* ---------- Tiny hash router ---------- */
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]))
    }

    function highlight(code) {
      // Lightweight syntax highlighting (good-enough).
      let s = escapeHtml(code)
      s = s.replace(/(\/\/[^\n]*|\/\*[\s\S]*?\*\/)/g, '<span class="comment">$1</span>')
      s = s.replace(/(['"`])((?:\\.|(?!\1).)*)\1/g, '<span class="string">$1$2$1</span>')
      s = s.replace(/\b(import|from|const|let|var|function|return|await|async|new|class|export|if|else|for|of|in|true|false|null|undefined)\b/g, '<span class="keyword">$1</span>')
      s = s.replace(/\b(\d+(?:\.\d+)?)\b/g, '<span class="num">$1</span>')
      s = s.replace(/\b([a-z_$][\w$]*)\s*\(/gi, '<span class="fn">$1</span>(')
      return s
    }

    const codeBlock = (code) => `<pre class="code">${highlight(code)}</pre>`

    function setActive(key) {
      Array.from(nav.querySelectorAll('a')).forEach(a => {
        a.classList.toggle('active', a.dataset.key === key)
      })
    }

    /* ---------- Demo registry ---------- */
    const demos = {}

    /* ============================================================
       DEMO 1 — Welcome
       ============================================================ */
    demos.welcome = function () {
      content.innerHTML = `
        <div class="welcome">
          <h2>GlueZero Live Showcase</h2>
          <p>
            7 capabilities of the frontend integration runtime, each with a
            <strong>real running example</strong> — live code, no mockups. No
            build step: this page imports <code>@gluezero/*</code> directly
            via <a class="npm-link" href="https://esm.sh">esm.sh</a> CDN.
            Use the menu on the left to explore each feature.
          </p>
          <div class="welcome-grid">
            <a class="welcome-card" href="#broker">
              <div class="icon">📡</div>
              <div class="title">Pub/Sub Broker</div>
              <div class="desc">Typed events published on topics + wildcard subscribers.</div>
            </a>
            <a class="welcome-card" href="#mapping">
              <div class="icon">🔀</div>
              <div class="title">Canonical Mapping</div>
              <div class="desc">Plugins with different vocabularies speak the same canonical language.</div>
            </a>
            <a class="welcome-card" href="#routing">
              <div class="icon">🧭</div>
              <div class="title">Routing + Gateway</div>
              <div class="desc">Declarative topic → HTTP fetch via gateway with retry policy.</div>
            </a>
            <a class="welcome-card" href="#worker">
              <div class="icon">⚙️</div>
              <div class="title">Worker Runtime</div>
              <div class="desc">Heavy computation off-thread, UI always responsive.</div>
            </a>
            <a class="welcome-card" href="#cache">
              <div class="icon">💾</div>
              <div class="title">Cache Layer</div>
              <div class="desc">In-memory cache hit/miss with visible TTL.</div>
            </a>
            <a class="welcome-card" href="#observability">
              <div class="icon">🔍</div>
              <div class="title">Observability</div>
              <div class="desc">Live Event Inspector: ring buffer of pipeline events.</div>
            </a>
            <a class="welcome-card" href="#theme">
              <div class="icon">🎨</div>
              <div class="title">Theme Layer</div>
              <div class="desc">Runtime brand swap via canonical --gz-* design tokens.</div>
            </a>
          </div>
        </div>
      `
    }

    /* ============================================================
       DEMO 2 — Pub/Sub Broker
       ============================================================ */
    demos.broker = function () {
      content.innerHTML = `
        <div class="demo">
          <h2>📡 Pub/Sub Broker</h2>
          <p class="lead">
            The broker is the heart of GlueZero. Components publish events on topics
            (format <code>entity.action.status</code>) and others subscribe via
            wildcard patterns. Zero direct coupling.
          </p>

          <div class="demo-section">
            <h3>Live <span class="pill">real UI</span></h3>
            <div class="controls">
              <input id="broker-topic" placeholder="topic (e.g. weather.requested)" value="weather.requested">
              <input id="broker-payload" placeholder='JSON payload (e.g. {"city":"Rome"})' value='{"city":"Rome"}'>
              <button class="primary" id="broker-publish" type="button">Publish</button>
              <button id="broker-clear" type="button">Clear log</button>
            </div>
            <div class="stats">
              <div class="stat"><div class="label">Subscribers <code>weather.*</code></div><div class="value ok" id="broker-stat-weather">1</div></div>
              <div class="stat"><div class="label">Subscribers <code>*.requested</code></div><div class="value ok" id="broker-stat-requested">1</div></div>
              <div class="stat"><div class="label">Subscribers <code>system.error</code></div><div class="value warn" id="broker-stat-err">1</div></div>
              <div class="stat"><div class="label">Events published</div><div class="value" id="broker-stat-count">0</div></div>
            </div>
            <div class="live-output" id="broker-log"></div>
          </div>

          <div class="demo-section">
            <h3>Salient code <span class="pill">@gluezero/core</span></h3>
            <p class="pre-explainer">
              Three subscribers with different patterns: single-segment wildcard, prefix wildcard, exact topic.
              The broker dispatches the same event to all subscribers whose pattern matches.
            </p>
            ${codeBlock(`import { createBroker } from '@gluezero/core'

const broker = createBroker({ runtime: { logLevel: 'info' } })

// Subscribe — single-segment wildcard
broker.subscribe('weather.*', (event) => {
  console.log('weather:', event.topic, event.payload)
})

// Subscribe — action wildcard
broker.subscribe('*.requested', (event) => {
  console.log('requested:', event.topic)
})

// Subscribe — system error fallback
broker.subscribe('system.error', (event) => {
  console.error(event.payload.error.message)
})

// Publish — async via queueMicrotask (FIFO, no re-entrancy)
broker.publish('weather.requested', { city: 'Rome' }, {
  source: { type: 'plugin', id: 'weather-form' }
})`)}
          </div>
        </div>
      `

      const broker = createBroker({ runtime: { logLevel: 'silent' } })
      const log = document.getElementById('broker-log')
      const counter = document.getElementById('broker-stat-count')
      let count = 0

      const append = (cls, text) => {
        const ts = new Date().toLocaleTimeString('en-US', { hour12: false }) + '.' + String(Date.now() % 1000).padStart(3, '0')
        const row = document.createElement('div')
        row.className = 'row'
        row.innerHTML = `<span class="ts">${ts}</span><span class="${cls}">${escapeHtml(text)}</span>`
        log.appendChild(row)
        log.scrollTop = log.scrollHeight
      }

      broker.subscribe('weather.*', (event) => {
        append('topic', `[weather.*] match → ${event.topic} payload=${JSON.stringify(event.payload)}`)
      })
      broker.subscribe('*.requested', (event) => {
        append('info', `[*.requested] match → ${event.topic}`)
      })
      broker.subscribe('system.error', (event) => {
        append('err', `[system.error] ${event.payload?.error?.message || 'unknown error'}`)
      })

      append('info', '✓ Broker created. 3 subscribers registered. Try publishing!')

      document.getElementById('broker-publish').addEventListener('click', () => {
        const topic = document.getElementById('broker-topic').value.trim()
        const raw = document.getElementById('broker-payload').value.trim()
        if (!topic) { append('err', 'Topic is empty'); return }
        let payload
        try { payload = raw ? JSON.parse(raw) : {} }
        catch (e) { append('err', `Invalid JSON payload: ${e.message}`); return }
        try {
          broker.publish(topic, payload, { source: { type: 'plugin', id: 'showcase' } })
          count++
          counter.textContent = String(count)
          append('ok', `→ publish ${topic}`)
        } catch (e) {
          append('err', `Publish error: ${e.message}`)
        }
      })
      document.getElementById('broker-clear').addEventListener('click', () => { log.innerHTML = '' })
    }

    /* ============================================================
       DEMO 3 — Canonical Mapping
       ============================================================ */
    demos.mapping = function () {
      content.innerHTML = `
        <div class="demo">
          <h2>🔀 Canonical Mapping</h2>
          <p class="lead">
            Plugins built independently may use different field names. The
            <strong>bidirectional mapper</strong> translates from the local vocabulary
            to the canonical one (and vice versa) without forcing different plugin
            authors to agree on names.
          </p>

          <div class="demo-section">
            <h3>Live <span class="pill">bidirectional transform</span></h3>
            <div class="controls">
              <button class="primary" id="map-publish-it" type="button">Publish Italian format</button>

              <p style="opacity:0.75;font-size:14px;margin:8px 0 16px">Same HTML markup, different palette applied via CSS Custom Properties on <code>:root</code>. No full React/Vue/Svelte re-render: only properties change.</p>
              <button data-gz-role="action.primary">Primary action</button>
              <button data-gz-role="action.secondary">Secondary</button>
            </div>
          </div>

          <div class="demo-section">
            <h3>Salient code <span class="pill">@gluezero/theme</span></h3>
            ${codeBlock(`import { createTheme } from '@gluezero/theme/factory'
import '@gluezero/theme/dist/tokens-default.css'

const theme = createTheme({ mode: 'auto' })

// Runtime brand swap — applyTokens overrides only the changed tokens
theme.applyTokens({
  '--gz-color-action-primary-bg':   '#10b981',
  '--gz-color-action-primary-text': '#ffffff',
  '--gz-color-surface-base':        '#ecfdf5'
})

// Broker events (ui.*) for observability — pipeline §28
broker.subscribe('ui.theme.changed', (event) => {
  console.log(event.payload.tokens)  // tokens applied
})

// Automatic lifecycle cascade:
// unregisterPlugin → unregisterAdapter (LIFE-02 ext F7)`)}
          </div>
        </div>
      `

      const preview = document.getElementById('theme-preview')

      const brands = {
        default: {
          '--gz-color-action-primary-bg': '#6366F1',
          '--gz-color-action-primary-text': '#ffffff',
          '--gz-color-surface-base': document.documentElement.getAttribute('data-gz-theme') === 'dark' ? '#1c1c2e' : '#ffffff',
          '--gz-color-text-base': document.documentElement.getAttribute('data-gz-theme') === 'dark' ? '#e0e0ff' : '#1a1a3a',
          '--gz-color-border-base': '#6366F1'
        },
        emerald: {
          '--gz-color-action-primary-bg': '#10b981',
          '--gz-color-action-primary-text': '#ffffff',
          '--gz-color-surface-base': document.documentElement.getAttribute('data-gz-theme') === 'dark' ? '#022c22' : '#ecfdf5',
          '--gz-color-text-base': document.documentElement.getAttribute('data-gz-theme') === 'dark' ? '#a7f3d0' : '#064e3b',
          '--gz-color-border-base': '#10b981'
        },
        sunset: {
          '--gz-color-action-primary-bg': '#f97316',
          '--gz-color-action-primary-text': '#ffffff',
          '--gz-color-surface-base': document.documentElement.getAttribute('data-gz-theme') === 'dark' ? '#3a1a0a' : '#fff7ed',
          '--gz-color-text-base': document.documentElement.getAttribute('data-gz-theme') === 'dark' ? '#fed7aa' : '#7c2d12',
          '--gz-color-border-base': '#f97316'
        }
      }

      const applyBrand = (brand) => {
        const tokens = brands[brand]
        Object.entries(tokens).forEach(([k, v]) => preview.style.setProperty(k, v))
      }

      applyBrand('default')

      document.getElementById('theme-brand-default').addEventListener('click', () => applyBrand('default'))
      document.getElementById('theme-brand-emerald').addEventListener('click', () => applyBrand('emerald'))
      document.getElementById('theme-brand-sunset').addEventListener('click', () => applyBrand('sunset'))
    }

    /* ---------- Router ---------- */
    function route() {
      const key = (location.hash.slice(1) || 'welcome').split('?')[0]
      const fn = demos[key] || demos.welcome
      setActive(key)
      try { fn() }
      catch (e) {
        content.innerHTML = `<div class="demo"><h2>Demo error</h2><pre class="code">${escapeHtml(e.stack || e.message)}</pre></div>`
      }
    }
    window.addEventListener('hashchange', route)
    route()
  </script>
</body>
</html>
