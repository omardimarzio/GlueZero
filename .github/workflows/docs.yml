name: docs

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      # Build TypeDoc API reference (genera markdown da JSDoc dei 22 packages → docs/v2/api/)
      - run: pnpm docs:build

      # Verifica struttura docs/v2/ unified site (markdown PRD §41 + TypeDoc API reference)
      - name: Verify docs/v2/ structure
        run: |
          test -f docs/v2/index.md
          test -f docs/v2/01-architecture.md
          test -f docs/v2/17-migration-guide.md
          test -f docs/v2/18-performance-bundle.md
          test -d docs/v2/api
          echo "docs/v2/ structure verified — 18 markdown + TypeDoc API reference"

      - uses: actions/configure-pages@v5

      # Deploy unified site docs/v2/ (18 markdown source + docs/v2/api/ TypeDoc output)
      # URL target: https://omardimarzio.github.io/GlueZero/v2/
      # NB: GitHub Pages serve markdown raw. Per HTML rendering automatic, aggiungere mkdocs/docusaurus V2.1.
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/v2

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
